<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Abhishek Agnihotri | AI Engineer Portfolio</title>

  <!-- SEO -->
  <meta name="description" content="AI Engineer portfolio showcasing RAG systems, LLM apps, and AI solutions by Abhishek Agnihotri.">

  <!-- Open Graph -->
  <meta property="og:title" content="Abhishek Agnihotri | AI Portfolio">
  <meta property="og:description" content="Explore AI projects and intelligent systems.">

  <!-- Google Analytics -->
  <!-- 🔴 REPLACE G-XXXXXXX WITH YOUR ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXX');
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Styles -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #020617, #020617);
      color: white;
      margin: 0;
      opacity: 0;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .gradient-text {
      background: linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
      -webkit-background-clip:text;
      color: transparent;
    }

    /* Chatbot UI */
    #chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      max-height: 500px;
      display: none;
      flex-direction: column;
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }

    .msg-user { text-align: right; margin: 5px; color: #38bdf8; }
    .msg-bot { text-align: left; margin: 5px; color: #a78bfa; }

    #chat-input {
      display: flex;
      border-top: 1px solid #334155;
    }

    #chat-input input {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
    }

    #chat-input button {
      padding: 10px;
      background: #6366f1;
    }

    #chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6366f1;
      padding: 12px 16px;
      border-radius: 50px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="text-center py-32 px-6">
  <h1 class="text-5xl md:text-7xl font-extrabold gradient-text">🚀 Abhishek Agnihotri</h1>
  <p id="typing" class="mt-6 text-xl text-gray-300"></p>
  <p class="text-gray-400 mt-4">🚀 Open to freelance AI & data projects</p>
</section>

<!-- PROJECTS -->
<section class="py-20 px-6 text-center">
  <h2 class="text-3xl font-bold mb-12">🚀 Featured Projects</h2>
  <p class="text-gray-400">Explore my GitHub for full projects</p>
</section>

<!-- CTA -->
<section class="text-center py-20">
  <h2 class="text-4xl font-bold gradient-text">Let’s Build AI Together 🚀</h2>
  <p class="text-gray-400 mt-4">Available for freelance AI projects</p>
</section>

<!-- CHATBOT -->
<div id="chatbot">
  <div id="chat-messages"></div>
  <div id="chat-input">
    <input id="user-input" placeholder="Ask about my work..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="chat-toggle" onclick="toggleChat()">💬</div>

<!-- FOOTER -->
<footer class="text-center py-6 text-gray-500">
  © 2026 Abhishek Agnihotri
</footer>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();

// Typing effect
const text = "AI Engineer | RAG Specialist | Building AI Systems";
let i = 0;
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}
window.onload = () => {
  document.body.style.opacity = "1";
  typeEffect();
};

// Chatbot toggle
function toggleChat() {
  const bot = document.getElementById("chatbot");
  bot.style.display = bot.style.display === "flex" ? "none" : "flex";
}

// Chatbot logic (demo AI)
function sendMessage() {
  const input = document.getElementById("user-input");
  const msg = input.value;
  if (!msg) return;

  const chat = document.getElementById("chat-messages");

  chat.innerHTML += `<div class="msg-user">${msg}</div>`;

  let reply = "Thanks for your message! I build AI solutions. Let's connect.";

  if (msg.toLowerCase().includes("project")) {
    reply = "Check my GitHub projects above 🚀";
  }

  if (msg.toLowerCase().includes("hire")) {
    reply = "Great! Email me at agnihotriabhi19@gmail.com 💼";
  }

  chat.innerHTML += `<div class="msg-bot">${reply}</div>`;

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
